
services:
  mysql:
    image: mysql:8.0
    container_name: sgi_mysql
    restart: always
    command: --port=3311
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    ports:
      - "3308:3311"
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./pcelmedic_database.sql:/docker-entrypoint-initdb.d/pcelmedic_database.sql:ro
    networks:
      - sga_network

  app:
    build: .
    container_name: sgi_app
    restart: always
    depends_on:
      - mysql
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_NAME: ${DB_DATABASE}
      DISPLAY: host.docker.internal:0
    volumes:
      - ./GUI:/app/GUI
      - ./Logica:/app/Logica
      - ./DAO:/app/DAO
      - ./Modelo:/app/Modelo
      - ./Utilidades:/app/Utilidades
      - ./Config:/app/Config
      - ./Reportes:/app/Reportes
    networks:
      - sga_network
    stdin_open: true
    tty: true

networks:
  sga_network:
    driver: bridge